<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Clone</title>
<style>
/* Reset */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

/* Hero Section */
.hero {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

/* Hero Images Responsive */
.hero img {
  width: 100%;          /* screen width ke hisab se adjust */
  max-width: 800px;     /* max width hero image */
  height: auto;         /* aspect ratio maintain */
  display: block;
  object-fit: cover;    /* image stretch avoid */
}
</style>
</head>
<body>

<!-- Hero Section -->
<section class="hero">
  <img src="images/hero1.jpg" alt="Hero 1">
  <img src="images/hero2.jpg" alt="Hero 2">
  <img src="images/hero3.jpg" alt="Hero 3">
  <img src="images/hero4.jpg" alt="Hero 4">
  <img src="images/hero5.jpg" alt="Hero 5">
  <img src="images/hero6.jpg" alt="Hero 6">
</section>

</body>
</html>
